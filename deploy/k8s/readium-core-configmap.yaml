# yamllint disable rule:line-length
apiVersion: v1
kind: ConfigMap
metadata:
  name: readium-core-config
  labels:
    app: readium-core
data:
  lcpserver.yaml: |
    profile: "basic"
    lcp_update_auth:
      username: "admin"
      password: "admin_pass"
    lcp:
      host: "0.0.0.0"
      port: 8989
      public_base_url: "http://lcp-core:8989"
      auth_file: "/srv/readium/config/htpasswd"
      database: "sqlite3://file:/srv/readium/data/lcp.sqlite?cache=shared&mode=rwc"
    certificate:
      cert: "/srv/readium/config/cert-edrlab-test.pem"
      private_key: "/srv/readium/config/privkey-edrlab-test.pem"
    license:
      links:
        status: "https://status.testmedical.ir/licenses/{license_id}/status" # yamllint disable-line rule:line-length
  lsdserver.yaml: |
    profile: "basic"
    lcp_update_auth:
      username: "admin"
      password: "admin_pass"
    lsd_notify_auth:
      username: "admin"
      password: "admin_pass"
    cms_access_auth:
      username: ""
      password: ""
    lcp:
      host: "0.0.0.0"
      public_base_url: "http://lcp-core:8989"
    lsd:
      host: "0.0.0.0"
      port: 8990
      public_base_url: "https://status.testmedical.ir"
      database: "sqlite3://file:/srv/readium/data/lsd.sqlite?cache=shared&mode=rwc"
      auth_file: "/srv/readium/config/htpasswd"
      license_link_url: "https://status.testmedical.ir/licenses/{license_id}" # yamllint disable-line rule:line-length
      user_data_url: >-
        https://testmedical.ir/api/v1/licenses/{license_id}/user
    license_status:
      register: true
