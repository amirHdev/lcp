apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lcp-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/amirhdev/ebook-lcp-server.git
    targetRevision: main
    path: deploy/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
