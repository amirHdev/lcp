services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lcp
      POSTGRES_USER: lcp
      POSTGRES_PASSWORD: lcp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  lcp-core:
    build: .
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - sh /srv/lcp/scripts/compose/prepare-readium-config.sh && exec /usr/local/bin/lcpserver
    environment:
      READIUM_LCPSERVER_CONFIG: /srv/readium/source/lcpserver.yaml
    ports:
      - "8989:8989"
    volumes:
      - ./deploy/compose/readium/lcpserver.yaml:/srv/readium/source/lcpserver.yaml:ro
      - ./deploy/k8s/readium-core-secret.yaml:/srv/readium/source/readium-core-secret.yaml:ro
      - ./scripts/compose/prepare-readium-config.sh:/srv/lcp/scripts/compose/prepare-readium-config.sh:ro
      - readium-config:/srv/readium/config
      - readium-data:/srv/readium/data

  lsd-core:
    build: .
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - sh /srv/lcp/scripts/compose/prepare-readium-config.sh && exec /usr/local/bin/lsdserver
    environment:
      READIUM_LSDSERVER_CONFIG: /srv/readium/source/lsdserver.yaml
    ports:
      - "8990:8990"
    volumes:
      - ./deploy/compose/readium/lsdserver.yaml:/srv/readium/source/lsdserver.yaml:ro
      - ./deploy/k8s/readium-core-secret.yaml:/srv/readium/source/readium-core-secret.yaml:ro
      - ./scripts/compose/prepare-readium-config.sh:/srv/lcp/scripts/compose/prepare-readium-config.sh:ro
      - readium-config:/srv/readium/config
      - readium-data:/srv/readium/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.21.0
    environment:
      SWAGGER_JSON_URL: http://localhost:8080/docs/openapi.yaml
    ports:
      - "8081:8080"

  lcp-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      lcp-core:
        condition: service_started
      lsd-core:
        condition: service_started
    environment:
      DB_DSN: postgres://lcp:lcp@postgres:5432/lcp?sslmode=disable
      JWT_SECRET: local-dev-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_2FA_CODE: "123456"
      PUBLISHER_USERNAME: publisher
      PUBLISHER_PASSWORD: publisher
      LCP_PROVIDER_URI: http://127.0.0.1:8080
      LCP_CORE_URL: http://lcp-core:8989
      LCP_CORE_USER: admin
      LCP_CORE_PASSWORD: admin_pass
      SERVER_PORT: :8080
      PUBLIC_BASE_URL: http://127.0.0.1:8080
      STATUS_BASE_URL: http://lsd-core:8990
      DATA_DIR: /var/lib/lcp/data
      LCP_STORAGE_MODE: s3
      LCP_STORAGE_FS_DIR: /var/lib/lcp/storage
      LCP_S3_ENDPOINT: minio:9000
      LCP_S3_PUBLIC_ENDPOINT: localhost:9000
      LCP_S3_REGION: us-east-1
      LCP_S3_BUCKET: lcp-publications
      LCP_S3_ACCESS_KEY: minioadmin
      LCP_S3_SECRET_KEY: minioadmin
      LCP_S3_USE_SSL: "false"
      LCP_S3_SIGNED_URL_TTL_SECONDS: "900"
      LCP_PROFILE: development
    ports:
      - "8080:8080"
    volumes:
      - lcp-data:/var/lib/lcp/data
      - lcp-storage:/var/lib/lcp/storage

  admin-ui:
    build: ./frontend
    depends_on:
      - lcp-server
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  lcp-data:
  lcp-storage:
  readium-config:
  readium-data:
  minio-data:
  grafana-data:
